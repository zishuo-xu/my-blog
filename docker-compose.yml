# docker-compose.yml - 一键启动前后端 + Nginx反向代理
# 使用方法：docker-compose up -d
version: "3.8"

services:
  # ===== 后端服务 =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blog-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data/blog.db
      - UPLOAD_DIR=/app/data/upload
      - FRONTEND_URL=http://localhost
    volumes:
      # 挂载数据目录到宿主机，避免容器删除数据丢失
      - ./data/backend:/app/data
    ports:
      - "8000:8000"

  # ===== 前端服务（Nginx） =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blog-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  # 数据持久化卷
  backend-data:
